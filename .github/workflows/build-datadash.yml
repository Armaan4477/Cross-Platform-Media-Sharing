  build-linux-arm1-test:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
            
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1 \
            libegl-mesa0 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libwayland-server0 \
            libwayland-bin \
            libwayland-dev \
            libgbm1 \
            libgbm-dev \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-* \
            libx11-xcb1 \
            libglib2.0-0 \
            libxrender1 \
            libxkbcommon0 \
            libfontconfig1 \
            libdrm2 \
            mesa-utils \
            mesa-utils-extra \
            qt6-base-dev \
            libqt6core6 \
            libqt6gui6 \
            libqt6widgets6 \
            libpulse0 \
            libpulse-mainloop-glib0 \
            pulseaudio

      - name: Setup Python venv
        run: |
          python -m venv --clear venv
          source venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade packaging

      - name: Install dependencies
        run: |
          source venv/bin/activate
          export PYTHONPATH="${PYTHONPATH}:/opt/hostedtoolcache/Python/3.12.8/arm64/lib/python3.12/site-packages"
          pip install --no-cache-dir -r Desktop-app/requirements.txt
          pip install --no-cache-dir pyinstaller

      - name: Build for Linux arm 1
        env:
          PYTHONPATH: /opt/hostedtoolcache/Python/3.12.8/arm64/lib/python3.12/site-packages
          LD_LIBRARY_PATH: /usr/lib/aarch64-linux-gnu:/opt/hostedtoolcache/Python/3.12.8/arm64/lib
        run: |
          source venv/bin/activate
          cd Desktop-app
          pyinstaller --onefile \
            --clean \
            --hidden-import=PyQt6 \
            --hidden-import=PyQt6.QtCore \
            --hidden-import=PyQt6.QtGui \
            --hidden-import=PyQt6.QtWidgets \
            --hidden-import=ctypes \
            --hidden-import=ctypes.util \
            --collect-all PyQt6 \
            --add-data "./icons:icons" \
            --add-data "./assets:assets" \
            --add-binary "/usr/lib/*/libQt6Core.so.6:." \
            --add-binary "/usr/lib/*/libQt6Gui.so.6:." \
            --add-binary "/usr/lib/*/libQt6Widgets.so.6:." \
            --add-binary "/usr/lib/aarch64-linux-gnu/libEGL_mesa.so.0:." \
            --add-binary "/usr/lib/aarch64-linux-gnu/libgbm.so.1:." \
            --add-binary "/usr/lib/aarch64-linux-gnu/libwayland-client.so.0:." \
            --add-binary "/usr/lib/aarch64-linux-gnu/libwayland-server.so.0:." \
            --name=DataDash main.py
          mv dist/DataDash "../DataDash(linux arm1)"

      - name: Upload Linux ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: DataDash(linux arm1)
          path: DataDash\(linux\ arm1\)
